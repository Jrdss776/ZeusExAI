name: ZeusExAI CI

on:
  pull_request:
    paths:
      - "src/openjarvis/zeusex/**"
      - "src/openjarvis/cli/zeusex_cmd.py"
      - "tests/zeusex/**"
      - "pyproject.toml"
      - ".github/workflows/zeusex-ci.yml"
  push:
    branches:
      - develop-zeusex
    paths:
      - "src/openjarvis/zeusex/**"
      - "src/openjarvis/cli/zeusex_cmd.py"
      - "tests/zeusex/**"
      - "pyproject.toml"
      - ".github/workflows/zeusex-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: zeusex-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest

      - name: Run ZeusExAI tests
        env:
          ZEUSEX_VOICE_ENABLED: "false"
          ZEUSEX_AI_PROVIDER: "disabled"
        run: python -m pytest tests/zeusex -q

      - name: Compile ZeusExAI modules
        run: python -m compileall -q src/openjarvis/zeusex src/openjarvis/cli/zeusex_cmd.py

  lint:
    name: Ruff critical checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Ruff
        run: python -m pip install ruff

      - name: Check critical Python errors
        run: >-
          ruff check
          --select E9,F63,F7,F82
          src/openjarvis/zeusex
          src/openjarvis/cli/zeusex_cmd.py
          tests/zeusex
