target-version = "py310"
src = ["src", "tests"]
extend-exclude = [
    "examples/twitter_bot/slack_preview.py",
    "src/openjarvis/cli/zeusex_cmd.py",
    "src/openjarvis/zeusex/*.py",
    "src/zeusex/*.py",
    "tests/zeusex/*.py",
    "tools/pearl-reference-oracle/smoke_test.py",
]

[lint]
select = ["E", "F", "I", "W"]

[lint.per-file-ignores]
"src/openjarvis/evals/datasets/*.py" = ["E501"]
"src/openjarvis/evals/scorers/*.py" = ["E501"]
"src/openjarvis/agents/hybrid/**/*.py" = ["E501"]
"src/openjarvis/agents/research_loop.py" = ["E501"]

# ZeusExAI contains user-facing CLI text, prompts, manifests and test fixtures
# whose readability is reduced by artificial line wrapping. These paths are
# excluded from Ruff's formatter while the fork remains synchronized with the
# upstream OpenJarvis layout; the dedicated ZeusExAI CI still runs critical
# syntax and undefined-name checks plus the complete test matrix.
"examples/twitter_bot/slack_preview.py" = ["E501"]
"src/openjarvis/cli/zeusex_cmd.py" = ["E501"]
"src/openjarvis/zeusex/*.py" = ["E501", "I001"]
"src/zeusex/*.py" = ["E501", "I001"]
"tests/zeusex/*.py" = ["E501", "I001"]
"tools/pearl-reference-oracle/smoke_test.py" = ["E501"]
