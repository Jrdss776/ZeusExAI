name: ZeusExAI one-time format

on:
  pull_request:
    paths:
      - ".github/workflows/zeusex-format-once.yml"
  push:
    branches:
      - develop-zeusex
    paths:
      - ".github/workflows/zeusex-format-once.yml"

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v6
        with:
          ref: develop-zeusex
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Install project tooling
        run: uv sync --locked --group dev

      - name: Apply Ruff fixes and formatting
        run: |
          files=(
            examples/twitter_bot/slack_preview.py
            src/openjarvis/cli/zeusex_cmd.py
            src/openjarvis/zeusex/__init__.py
            src/openjarvis/zeusex/__main__.py
            src/openjarvis/zeusex/diagnostics.py
            src/openjarvis/zeusex/engines.py
            src/openjarvis/zeusex/identity.py
            src/openjarvis/zeusex/local_automation.py
            src/openjarvis/zeusex/permissions.py
            src/openjarvis/zeusex/runtime.py
            src/openjarvis/zeusex/setup_assistant.py
            src/openjarvis/zeusex/skills.py
            src/openjarvis/zeusex/voice.py
            src/openjarvis/zeusex/voice_backends.py
            src/openjarvis/zeusex/voice_diagnostics.py
            src/openjarvis/zeusex/voice_runtime.py
            src/zeusex/assistant.py
            src/zeusex/config.py
            src/zeusex/memory.py
            tests/zeusex/test_compatibility.py
            tests/zeusex/test_desktop_automation.py
            tests/zeusex/test_diagnostics.py
            tests/zeusex/test_voice_backends.py
            tools/pearl-reference-oracle/smoke_test.py
          )
          uv run ruff check --fix "${files[@]}"
          uv run ruff format "${files[@]}"
          uv run ruff check "${files[@]}"

      - name: Commit formatted files
        run: |
          if git diff --quiet; then
            echo "No formatting changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            examples/twitter_bot/slack_preview.py \
            src/openjarvis/cli/zeusex_cmd.py \
            src/openjarvis/zeusex \
            src/zeusex \
            tests/zeusex \
            tools/pearl-reference-oracle/smoke_test.py
          git commit -m "style: align ZeusExAI files with project Ruff rules"
          git push origin HEAD:develop-zeusex
